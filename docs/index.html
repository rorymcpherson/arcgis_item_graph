<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ArcGIS Item Graph Visualisation</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <link rel="stylesheet" href="./css/graph.css" />
    </head>
    <body>
        <div class="sidebar-controls">
            <div class="controls">
                <!-- Hidden file input -->
                <input type="file" id="load-data" accept=".json" style="display: none;" />

                <!-- Buttons with base and modifier classes -->
                <button class="btn btn--blue" onclick="triggerFileLoad()">Load Data</button>
                <button class="btn btn--blue" onclick="resetAllNodesToFloating()">Reset node positions</button>
                <div class="popup-toggle">
                    <input type="checkbox" id="enable-popups" checked/>
                    <label for="enable-popups">Enable Popups</label>
                </div>
                <div class="popup-toggle">
                    <input type="checkbox" id="enable-labels" />
                    <label for="enable-labels">Show Labels</label>
                </div>
            </div>

            <div class="physics-controls">
                <div class="physics-header">
                    <h3>Adjust physics options</h3>
                    <button class="btn btn--red btn--small"
                        onclick="resetPhysics()">Reset</button>
                </div>

                <div class="physics-option">
                    <label for="link-distance">Link distance</label>
                    <div class="control-group">
                        <input type="range" id="link-distance" min="10" max="500" step="10" value="200" />
                        <input type="number" id="link-distance-value" min="10" max="500" step="10" value="200" />
                    </div>
                </div>

                <div class="physics-option">
                    <label for="collision-radius">Collision radius</label>
                    <div class="control-group">
                        <input type="range" id="collision-radius" min="10" max="500" step="10" value="100" />
                        <input type="number" id="collision-radius-value" min="10" max="500" step="10" value="100" />
                    </div>
                </div>
            </div>
        </div>

        <div id="popup" class="popup"></div>
        <script src="./js/graph.js"></script>
    </body>
</html>
